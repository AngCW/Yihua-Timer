name: debate_timer
description: A debate timer application for Windows desktop
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path_provider: 2.1.2 
  intl: ^0.20.2
dependency_overrides:
  path_provider_windows: 2.2.1
  path_provider_foundation: 2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/

