name: debate_timer
description: A debate timer application for Windows desktop
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  path_provider: 2.1.2 
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.0
  intl: ^0.20.2
  file_picker: ^10.3.10
  path: ^1.9.1
  shared_preferences: ^2.5.3
  audioplayers: ^6.0.0
  window_manager: ^0.3.8
dependency_overrides:
  path_provider_windows: 2.2.1
  path_provider_foundation: 2.3.0
  path: 1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  drift_dev: ^2.20.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/

